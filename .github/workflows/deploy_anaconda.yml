name: Deploy Conda Package

on:
  push:
    branches: [ "master" ]
    tags:
      - '*'
  pull_request:
    branches: [ "master" ]

jobs:
  conda_deployment:
    name: Conda deployment of package for platform ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v3

      - name: Conda environment creation and activation
        uses: conda-incubator/setup-miniconda@v3
        with:
          channels: conda-forge, martinpdes
          python-version: ${{ matrix.python-version }}

      - run: |
          conda install conda-build

      - name: Build and upload the conda packages
        uses: uibcdf/action-build-and-upload-conda-packages@v1.3.0
        with:
          meta_yaml_dir: .
          python-version: ${{ matrix.python-version }}
          user: martinpdes
          label: auto
          token: ${{ secrets.ANACONDA_TOKEN }}
