name: Static quality checks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install quality tools
        run: python -m pip install --upgrade pip && python -m pip install "ruff==0.11.2" "mypy==1.15.0"
      - name: Ruff
        run: python -m ruff check PyMieSim tests
      - name: Mypy
        run: python -m mypy PyMieSim/gui/parsing.py PyMieSim/gui/schemas.py
