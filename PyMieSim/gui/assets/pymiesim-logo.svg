<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1100" height="400"
     viewBox="200 50 700 400"
     role="img"
     aria-label="PyMieSim Flow-cytometry Calibration logo">
  <title>PyMieSim Flow-cytometry Calibration</title>
  <style>
    .logo-main {
      font-family: "Avenir Next", "Century Gothic", Futura, Montserrat, Arial, serif;
      font-size: 186px;
      font-weight: 560;
      letter-spacing: -3px;
      fill: #26272a;
    }
    .logo-subtitle {
      font-family: "Avenir Next", "Century Gothic", Futura, Montserrat, Arial, sans-serif;
      font-size: 55px;
      font-weight: 350;
      letter-spacing: -1.2px;
      fill: #26272a;
      text-anchor: end;
    }
  </style>

  <text class="logo-main" x="35" y="290"><tspan>P</tspan><tspan dx="9">yMieSim</tspan></text>

  <!-- Original blue/cyan chevron X preserved as vector paths, shifted slightly right for better spacing -->
  <g transform="translate(-108,0)">
    <path d="m 975.8673,149.6464 h 26 l 64,88 -64,88 h -26 l 64,-88 z"
          fill="#2d6df6"/>
    <path d="m 1135.8673,149.6464 h 28 l -64,88 64,88 h -28 l -62,-88 z"
          fill="#16c9dc"/>
  </g>

  <text class="logo-subtitle" x="1078" y="397">Light Scattering Simulation</text>
  <line x1="460" y1="416" x2="1078" y2="416"
        stroke="#26272a" stroke-width="5" stroke-linecap="butt" />
</svg>
